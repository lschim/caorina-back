spring:
  application:
    name: caorina-back

  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://localhost:54320/caorina
    username: caorina
    password: caorina
    driver-class-name: org.postgresql.Driver

  flyway:
    locations: classpath:db/migration,classpath:db/seed

  jpa:
    open-in-view: false
    show-sql: true

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false


logging:
  level:
    root: INFO
    com.blacktogreen.caorina: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG

jwt:
  secret: ${JWT_SECRET}